<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Usage Live · countdown to the next Claude Code reset</title>
<meta name="description" content="Live countdown to the next Claude Code reset. Flags if Anthropic resets all users early.">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #14141c;
    --border: rgba(255,255,255,0.07);
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #34d399;
    --warn: #f87171;
    --alert-bg: rgba(248,113,113,0.12);
  }
  :root.light {
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #0f172a;
    --muted: #64748b;
    --accent: #10b981;
    --warn: #dc2626;
    --alert-bg: rgba(220,38,38,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
  }
  header h1 span { color: var(--text); }
  .theme-toggle,
  .lang-select {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .theme-toggle:hover, .lang-select:hover { background: var(--border); }
  .lang-select { font-family: inherit; }
  .header-controls { display: flex; gap: 8px; align-items: center; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 48px;
  }

  .alert {
    width: 100%;
    max-width: 720px;
    background: var(--alert-bg);
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 14px 18px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .alert.show { display: flex; }
  .alert::before { content: "🚨"; font-size: 18px; }

  .counter-block {
    text-align: center;
    width: 100%;
  }
  .counter-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .counter {
    font-family: "SF Mono", Monaco, "Cascadia Code", Consolas, monospace;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .counter.main { font-size: clamp(56px, 12vw, 128px); }
  .counter.sub  { font-size: clamp(28px, 5vw, 48px); color: var(--muted); }
  .counter .unit { font-size: 0.35em; color: var(--muted); letter-spacing: 0.05em; margin-left: 4px; }

  .history-section {
    width: 100%;
    max-width: 720px;
    margin-top: 24px;
  }
  .history-section h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .history-list {
    list-style: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
  }
  .history-list li {
    padding: 12px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .history-list li:last-child { border-bottom: none; }
  .history-list li .ts { color: var(--muted); font-variant-numeric: tabular-nums; }
  .history-list li .delta { color: var(--warn); font-weight: 600; }
  .history-empty {
    padding: 14px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  footer {
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
  }
  footer a {
    color: var(--accent);
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }

  .updated {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<header>
  <h1>claude usage <span>live</span></h1>
  <div class="header-controls">
    <select id="langSelect" class="lang-select" aria-label="Language">
      <option value="es">ES</option>
      <option value="en">EN</option>
      <option value="pt">PT</option>
    </select>
    <button id="themeToggle" class="theme-toggle" title="Toggle theme">☾</button>
  </div>
</header>

<main>
  <div id="alert" class="alert" data-i18n="alert"></div>

  <div class="counter-block">
    <div class="counter-label" data-i18n="weekly_label"></div>
    <div id="weeklyCounter" class="counter main">--:--:--</div>
  </div>

  <div class="counter-block">
    <div class="counter-label" data-i18n="session_label"></div>
    <div id="sessionCounter" class="counter sub">--:--:--</div>
  </div>

  <div class="history-section">
    <h2 id="historyTitle" data-i18n="history_title"></h2>
    <ul id="historyList" class="history-list">
      <li class="history-empty" data-i18n="history_empty"></li>
    </ul>
  </div>

  <div id="updated" class="updated"></div>
</main>

<footer>
  <span data-i18n="footer_by"></span>
  <a href="https://github.com/missingus3r" target="_blank" rel="noopener">@missingus3r</a> ·
  <a href="https://github.com/missingus3r/claude-usage-live" target="_blank" rel="noopener" data-i18n="footer_repo"></a>
</footer>

<script>
const DATA_URL = "./data/usage.json?t=" + Date.now();
let dataState = null;
let currentLang = "es";

const I18N = {
  es: {
    alert: "Anthropic reseteó el uso antes de tiempo para todos los usuarios.",
    weekly_label: "Próximo reset semanal",
    session_label: "Próximo reset de sesión (5h)",
    history_title: "Histórico de resets anticipados detectados",
    history_empty: "Sin resets anticipados detectados todavía.",
    updated_prefix: "Última actualización: ",
    waiting: "Esperando primera lectura del tracker…",
    error_loading: "Error cargando datos: ",
    footer_by: "by",
    footer_repo: "repo en GitHub",
    nd: "n/d",
    locale: "es-UY",
  },
  en: {
    alert: "Anthropic reset usage early for all users.",
    weekly_label: "Next weekly reset",
    session_label: "Next session reset (5h)",
    history_title: "Detected early-reset events",
    history_empty: "No early resets detected yet.",
    updated_prefix: "Last update: ",
    waiting: "Waiting for the tracker's first read…",
    error_loading: "Error loading data: ",
    footer_by: "by",
    footer_repo: "GitHub repo",
    nd: "n/a",
    locale: "en-US",
  },
  pt: {
    alert: "Anthropic reiniciou o uso antes do previsto para todos os usuários.",
    weekly_label: "Próximo reset semanal",
    session_label: "Próximo reset de sessão (5h)",
    history_title: "Histórico de resets antecipados detectados",
    history_empty: "Nenhum reset antecipado detectado ainda.",
    updated_prefix: "Última atualização: ",
    waiting: "Aguardando a primeira leitura do tracker…",
    error_loading: "Erro ao carregar dados: ",
    footer_by: "por",
    footer_repo: "repo no GitHub",
    nd: "n/d",
    locale: "pt-BR",
  },
};

function t(key) {
  return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en[key] || key);
}

function applyI18n(lang) {
  currentLang = (lang in I18N) ? lang : "en";
  document.documentElement.lang = currentLang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // Re-render dynamic parts that depend on locale
  if (dataState) {
    renderHistory(dataState.early_reset_history || []);
    renderUpdated(dataState.updated_at);
  }
}

function pad2(n) { return String(Math.max(0, Math.floor(n))).padStart(2, "0"); }

function formatDelta(ms) {
  if (!Number.isFinite(ms) || ms <= 0) return "00:00:00";
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  if (d > 0) return d + "d " + pad2(h) + ":" + pad2(m) + ":" + pad2(s);
  return pad2(h) + ":" + pad2(m) + ":" + pad2(s);
}

function tick() {
  if (!dataState) return;
  const now = Date.now();

  const wTarget = dataState.next_weekly_reset_at ? new Date(dataState.next_weekly_reset_at).getTime() : null;
  document.getElementById("weeklyCounter").textContent =
    wTarget ? formatDelta(wTarget - now) : (dataState.next_weekly_reset_text || t("nd"));

  const sTarget = dataState.next_session_reset_at ? new Date(dataState.next_session_reset_at).getTime() : null;
  document.getElementById("sessionCounter").textContent =
    sTarget ? formatDelta(sTarget - now) : (dataState.next_session_reset_text || t("nd"));
}

function renderHistory(history) {
  const ul = document.getElementById("historyList");
  if (!history || history.length === 0) {
    ul.innerHTML = '<li class="history-empty">' + t("history_empty") + '</li>';
    return;
  }
  ul.innerHTML = "";
  history.forEach(ev => {
    const li = document.createElement("li");
    const ts = new Date(ev.detected_at).toLocaleString(t("locale"), {
      day: "2-digit", month: "2-digit", year: "2-digit",
      hour: "2-digit", minute: "2-digit",
    });
    li.innerHTML = `<span class="ts">${ts}</span><span class="delta">−${ev.drop}%</span>`;
    ul.appendChild(li);
  });
}

function renderUpdated(updated_at) {
  const el = document.getElementById("updated");
  if (updated_at) {
    const upd = new Date(updated_at).toLocaleString(t("locale"), {
      day: "2-digit", month: "2-digit", year: "2-digit",
      hour: "2-digit", minute: "2-digit",
    });
    el.textContent = t("updated_prefix") + upd;
  } else {
    el.textContent = t("waiting");
  }
}

async function load() {
  try {
    const res = await fetch(DATA_URL, { cache: "no-store" });
    const data = await res.json();
    dataState = data;
    if (data.early_reset_detected) {
      document.getElementById("alert").classList.add("show");
    }
    renderHistory(data.early_reset_history || []);
    renderUpdated(data.updated_at);
    tick();
  } catch (e) {
    document.getElementById("updated").textContent = t("error_loading") + e.message;
  }
}

function applyTheme(t) {
  document.documentElement.classList.toggle("light", t === "light");
  document.getElementById("themeToggle").textContent = t === "light" ? "☀" : "☾";
}

document.getElementById("themeToggle").addEventListener("click", () => {
  const next = document.documentElement.classList.contains("light") ? "dark" : "light";
  localStorage.setItem("claude-usage-live-theme", next);
  applyTheme(next);
});

applyTheme(localStorage.getItem("claude-usage-live-theme") || "dark");

// Language: localStorage > browser default (es/en/pt) > fallback en
function detectLang() {
  const stored = localStorage.getItem("claude-usage-live-lang");
  if (stored && I18N[stored]) return stored;
  const nav = (navigator.language || "en").slice(0, 2).toLowerCase();
  if (I18N[nav]) return nav;
  return "en";
}
const initialLang = detectLang();
document.getElementById("langSelect").value = initialLang;
applyI18n(initialLang);
document.getElementById("langSelect").addEventListener("change", e => {
  localStorage.setItem("claude-usage-live-lang", e.target.value);
  applyI18n(e.target.value);
});

load();
setInterval(tick, 1000);
setInterval(load, 5 * 60 * 1000); // reload data every 5 min (json updates every 5h server-side)
</script>
</body>
</html>
